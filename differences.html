<script type="module">
import { Writer, ConlangContent } from './lib.js';
import { dict } from './dictionary.js';

dict.waitForDictLoad().then(() => {

    let total = 0;

    const arrangedWords = dict.getAllWords().map(w => {

        const excludedCategories = ["Onomotopoeia", "Grammar", "Phrases", "Consonant Sounds", "Vowel Sounds", "Connecting Letters"];

        if(excludedCategories.includes(w.category)) return null;

        return [w.script.Standard, w.script["A'atsilwi"]]
    });

    const differences = [];

    arrangedWords.forEach(wordset => {
        if(wordset == null) return;
        total++;
        if(wordset[0].toString(undefined, undefined, ["ortho", "ipa"]) !=
        wordset[1].toString(undefined, undefined, ["ortho", "ipa"])){
            differences.push(wordset);
        }
    })

    console.log(differences.length / total * 100 + "%")
    console.log(differences.map(w => `${w[0].toString(undefined, undefined, ["ortho"])} - ${w[1].toString(undefined, undefined, ["ortho"])}`).join("\n"));
})
    
    
</script>
